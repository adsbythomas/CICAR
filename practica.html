  .nav-cta {

  /* ─── HERO ─── */
  .practica-hero {
    background: linear-gradient(160deg, var(--navy) 0%, var(--blue) 100%);

    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .practica-hero::before {
    content: '';
    position: absolute; top: -20%; right: -10%;
    width: 60vw; height: 60vw; max-width: 600px; max-height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(29,132,199,0.22) 0%, transparent 70%);

  .practica-hero::after {
    content: '';

  .practica-tag {

    font-size: 11.5px; font-weight: 700;
    letter-spacing: 2.5px;

    background: rgba(166,218,241,0.14);

    text-transform: uppercase;

    border-radius: 100px;
    margin-bottom: 24px;

    color: var(--navy);

    color: var(--text-muted);
    line-height: 1.65;

    padding: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;

    font-size: 15px;

    color: var(--blue);
    font-weight: 800;
    flex-shrink: 0;

    padding: 16px 34px;
    border-radius: 10px;
    font-weight: 700; font-size: 15px;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 10px;

  .btn-primary svg { width: 18px; height: 18px; }
  .btn-outline {
    background: transparent; color: white;
    padding: 16px 34px;
    border-radius: 10px;
    font-weight: 600; font-size: 15px;
    text-decoration: none;
    border: 1.5px solid rgba(255,255,255,0.35);
    display: inline-flex; align-items: center; gap: 10px;
    transition: all 0.2s;

    font-size: 40px;
    color: var(--navy);
    margin-bottom: 14px;

  .practica-404 p {
    color: var(--text-muted);

    .practica-row { grid-template-columns: 1fr; gap: 14px; margin-bottom: 36px; }
    .practica-list { grid-template-columns: 1fr; gap: 0; }
    .nav-back span { display: none; }
    .nav-cta { display: none; }
