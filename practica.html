<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CICAR — Detalle de la práctica</title>
<link rel="icon" type="image/png" href="assets/logos/CICAR-08.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #172E44;
    --blue: #1D84C7;
    --mid: #53A1C6;
    --light: #A6DAF1;
    --gray: #D9D9D9;
    --pale: rgba(166,218,241,0.18);
    --text: #172E44;
    --text-muted: #4a6275;
    --radius: 12px;
    --radius-lg: 20px;
    --font-display: 'Hero', 'Poppins', system-ui, sans-serif;
    --font-body: 'Montserrat', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    color: var(--text);
    background: #fff;
    overflow-x: hidden;
  }

  /* ─── NAV ─── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(23,46,68,0.97);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%;
    height: 70px;
    border-bottom: 1px solid rgba(166,218,241,0.15);
  }
  .nav-logo { display: flex; align-items: center; text-decoration: none; }
  .nav-logo img { height: 44px; width: auto; display: block; }
  .nav-back {
    display: inline-flex; align-items: center; gap: 8px;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 14px; font-weight: 600;
    padding: 10px 18px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.2s;
  }
  .nav-back:hover { background: rgba(255,255,255,0.12); color: white; }
  .nav-back svg { width: 16px; height: 16px; }
  .nav-cta {
    background: var(--blue); color: white;
    padding: 10px 22px; border-radius: 8px;
    font-weight: 600; font-size: 14px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .nav-cta:hover { background: #13628f; }

  /* ─── HERO ─── */
  .practica-hero {
    background: linear-gradient(160deg, var(--navy) 0%, var(--blue) 100%);
    color: white;
    padding: 80px 5% 90px;
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  .practica-hero::before {
    content: '';
    position: absolute; top: -20%; right: -10%;
    width: 60vw; height: 60vw; max-width: 600px; max-height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(29,132,199,0.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .practica-hero::after {
    content: '';
    position: absolute; bottom: -15%; left: -5%;
    width: 35vw; height: 35vw;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(166,218,241,0.10) 0%, transparent 70%);
    pointer-events: none;
  }
  .practica-hero-inner {
    max-width: 820px;
    margin: 0 auto;
    position: relative; z-index: 1;
  }
  .practica-tag {
    display: inline-block;
    font-size: 11.5px; font-weight: 700;
    letter-spacing: 2.5px;
    color: var(--light);
    background: rgba(166,218,241,0.14);
    border: 1px solid rgba(166,218,241,0.32);
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  .practica-hero h1 {
    font-family: var(--font-display);
    font-size: clamp(34px, 5vw, 56px);
    line-height: 1.1;
    margin-bottom: 18px;
    letter-spacing: -0.5px;
  }
  .practica-hero p {
    font-size: 17px; line-height: 1.6;
    color: rgba(255,255,255,0.78);
    max-width: 640px;
    margin: 0 auto;
  }

  /* ─── CONTENT ─── */
  .practica-content {
    max-width: 880px;
    margin: 0 auto;
    padding: 80px 5% 40px;
  }
  .practica-section { margin-bottom: 48px; }
  .practica-section:last-child { margin-bottom: 0; }
  .practica-section h2 {
    font-family: var(--font-display);
    font-size: 26px;
    color: var(--navy);
    margin-bottom: 16px;
    letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 14px;
  }
  .practica-section h2::before {
    content: '';
    width: 4px; height: 22px;
    background: var(--blue);
    border-radius: 2px;
  }
  .practica-section p {
    font-size: 16px; line-height: 1.75;
    color: var(--text-muted);
  }
  .practica-section p + p { margin-top: 14px; }

  /* Two-column row: Preparación + Duración */
  .practica-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 48px;
  }
  .practica-card {
    background: var(--pale);
    border-left: 4px solid var(--blue);
    border-radius: 12px;
    padding: 24px 26px;
  }
  .practica-card h3 {
    font-family: var(--font-display);
    font-size: 18px;
    color: var(--navy);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .practica-card h3 svg { width: 20px; height: 20px; color: var(--blue); }
  .practica-card p {
    font-size: 14.5px;
    color: var(--text-muted);
    line-height: 1.65;
  }

  /* Lista de detecciones / indicaciones */
  .practica-list {
    list-style: none;
    padding: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
  }
  .practica-list li {
    font-size: 15px;
    color: var(--text-muted);
    padding: 10px 0;
    border-top: 1px solid rgba(166,218,241,0.4);
    display: flex; align-items: center; gap: 10px;
  }
  .practica-list li::before {
    content: '✓';
    color: var(--blue);
    font-weight: 800;
    flex-shrink: 0;
  }

  /* ─── CTA FINAL ─── */
  .practica-cta {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: white;
    padding: 70px 5%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .practica-cta::before {
    content: '';
    position: absolute; top: -30%; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(166,218,241,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .practica-cta-inner { position: relative; z-index: 1; max-width: 680px; margin: 0 auto; }
  .practica-cta h2 {
    font-family: var(--font-display);
    font-size: clamp(26px, 3vw, 36px);
    margin-bottom: 14px;
    letter-spacing: -0.3px;
  }
  .practica-cta p {
    color: rgba(255,255,255,0.78);
    font-size: 16px;
    line-height: 1.65;
    margin-bottom: 30px;
  }
  .practica-cta-buttons {
    display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  }
  .btn-primary {
    background: white; color: var(--navy);
    padding: 16px 34px;
    border-radius: 10px;
    font-weight: 700; font-size: 15px;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 10px;
    transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,255,255,0.18); }
  .btn-primary svg { width: 18px; height: 18px; }
  .btn-outline {
    background: transparent; color: white;
    padding: 16px 34px;
    border-radius: 10px;
    font-weight: 600; font-size: 15px;
    text-decoration: none;
    border: 1.5px solid rgba(255,255,255,0.35);
    display: inline-flex; align-items: center; gap: 10px;
    transition: all 0.2s;
  }
  .btn-outline:hover { background: rgba(255,255,255,0.08); border-color: white; }

  /* ─── FOOTER ─── */
  footer {
    background: var(--navy);
    color: rgba(255,255,255,0.6);
    padding: 32px 5%;
    text-align: center;
    font-size: 13px;
    border-top: 1px solid rgba(166,218,241,0.1);
  }
  footer a { color: var(--light); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* Estado 404 */
  .practica-404 {
    padding: 100px 5%;
    text-align: center;
  }
  .practica-404 h1 {
    font-family: var(--font-display);
    font-size: 40px;
    color: var(--navy);
    margin-bottom: 14px;
  }
  .practica-404 p {
    color: var(--text-muted);
    font-size: 16px;
    margin-bottom: 30px;
  }
  .practica-404 .btn-primary {
    background: var(--blue); color: white;
  }

  @media (max-width: 720px) {
    .practica-hero { padding: 56px 5% 64px; }
    .practica-content { padding: 56px 5% 30px; }
    .practica-section h2 { font-size: 22px; }
    .practica-row { grid-template-columns: 1fr; gap: 14px; margin-bottom: 36px; }
    .practica-list { grid-template-columns: 1fr; gap: 0; }
    .nav-back span { display: none; }
    .nav-cta { display: none; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo" aria-label="Volver al inicio">
    <img src="assets/logos/CICAR-12.png" alt="CICAR Barrio Norte">
  </a>
  <a href="index.html" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span>Volver al inicio</span>
  </a>
</nav>

<!-- Contenido dinámico -->
<div id="practica-root"></div>

<footer>
  <p>© 2025 CICAR Barrio Norte · <a href="index.html">Volver al inicio</a> · <a href="portal.html">Portal del paciente</a></p>
</footer>

<script>
  var PRACTICAS = {

    'ecodoppler-cardiaco': {
      tag: 'Imágenes cardíacas',
      title: 'Ecodoppler cardíaco color',
      subtitle: 'Evaluación morfológica y funcional del corazón en tiempo real, con flujo a color.',
      bookingId: 'ecodoppler-cardiaco',
      what: 'Es un estudio por ultrasonido que permite ver el corazón en tiempo real. Combina la imagen ecocardiográfica con el efecto Doppler color, que muestra cómo fluye la sangre por las cavidades cardíacas y a través de las válvulas. No usa radiación ni medios de contraste.',
      how: 'Te acostás cómodamente sobre una camilla. El médico aplica un gel transparente en el pecho y desliza un transductor (sonda) sobre la zona. Las ondas de ultrasonido generan imágenes y mediciones que se ven en una pantalla de alta resolución. Es indoloro y no invasivo.',
      prep: 'No requiere preparación especial. Podés comer normalmente antes del estudio y continuar con tu medicación habitual, salvo indicación contraria de tu cardiólogo.',
      duration: 'Entre 20 y 30 minutos.',
      detectsTitle: '¿Qué permite detectar?',
      detects: [
        'Valvulopatías (insuficiencia o estenosis)',
        'Miocardiopatías',
        'Función ventricular sistólica y diastólica',
        'Alteraciones de las cavidades cardíacas',
        'Cardiopatías congénitas en adultos',
        'Hipertensión pulmonar'
      ]
    },

    'ecg-digital': {
      tag: 'Estudios cardiológicos básicos',
      title: 'ECG Digital',
      subtitle: 'Electrocardiograma de reposo de 12 derivaciones con análisis computarizado automático.',
      bookingId: 'consulta-electrocardiografia',
      what: 'Es el registro de la actividad eléctrica del corazón en reposo. Es el estudio cardiológico más usado y permite detectar arritmias, infartos previos, hipertrofias y alteraciones de la conducción eléctrica del corazón. Su versión digital incluye análisis automático asistido por software.',
      how: 'Se colocan 10 electrodos en el pecho, brazos y piernas. El equipo registra las señales eléctricas durante unos pocos minutos. Es completamente indoloro y no requiere ninguna preparación. Los resultados se obtienen al instante.',
      prep: 'Ninguna preparación especial. Te pedimos venir con ropa cómoda y evitar usar cremas en el pecho ese día.',
      duration: '5 a 10 minutos.',
      detectsTitle: '¿Qué permite detectar?',
      detects: [
        'Arritmias y trastornos del ritmo',
        'Infarto agudo o antiguo',
        'Hipertrofia ventricular',
        'Bloqueos de conducción',
        'Alteraciones de electrolitos',
        'Pericarditis'
      ]
    },

    'holter': {
      tag: 'Monitoreo continuo',
      title: 'Holter 24/48 h',
      subtitle: 'Monitoreo ambulatorio del ritmo cardíaco durante 24, 48 o hasta 72 horas.',
      bookingId: 'consulta-electrocardiografia',
      what: 'Es un electrocardiograma continuo que graba la actividad eléctrica del corazón durante 24, 48 o hasta 72 horas mientras hacés tu vida normal. Permite detectar arritmias que no aparecen en un ECG de reposo común, especialmente las intermitentes.',
      how: 'Se colocan electrodos en el pecho conectados a un pequeño dispositivo que llevás puesto durante el período indicado. Podés moverte, dormir y hacer tus actividades normales. Al finalizar, devolvés el equipo y el cardiólogo analiza los datos en detalle.',
      prep: 'No requiere preparación. Evitá bañarte mientras lo tengas puesto. Te recomendamos llevar un diario simple de actividades y síntomas para correlacionar con el registro.',
      duration: '24, 48 o 72 horas. La colocación dura unos 15 minutos.',
      detectsTitle: '¿Qué permite detectar?',
      detects: [
        'Arritmias intermitentes',
        'Palpitaciones inexplicadas',
        'Síncopes o desmayos de causa desconocida',
        'Pausas o bradicardia significativa',
        'Evaluación de tratamiento antiarrítmico',
        'Eficacia de marcapasos'
      ]
    },

    'ecodoppler-vascular': {
      tag: 'Imágenes vasculares',
      title: 'Ecodoppler vascular periférico',
      subtitle: 'Evaluación del flujo sanguíneo en arterias y venas del cuello, brazos y piernas.',
      bookingId: 'ecodoppler-vascular',
      what: 'Es un estudio por ultrasonido no invasivo que mide el flujo sanguíneo en arterias y venas de cuello, miembros superiores e inferiores. Es clave para detectar obstrucciones, placas, estenosis e insuficiencia venosa, y para prevenir eventos cerebrovasculares.',
      how: 'Te acostás cómodamente. El técnico aplica gel sobre la zona a estudiar y desliza un transductor que emite ondas de ultrasonido. El equipo muestra en colores la velocidad y dirección del flujo sanguíneo en tiempo real.',
      prep: 'Para vasos de cuello y miembros: sin preparación. Para vasos abdominales puede requerirse ayuno de 6 horas — te lo confirmamos al sacar turno.',
      duration: '30 a 45 minutos según la zona estudiada.',
      detectsTitle: '¿Qué permite detectar?',
      detects: [
        'Placas de ateroma en carótidas',
        'Estenosis arteriales periféricas',
        'Trombosis venosa profunda',
        'Insuficiencia venosa crónica',
        'Aneurismas',
        'Várices y reflujo venoso'
      ]
    },

    'ecografia-general': {
      tag: 'Diagnóstico por imágenes',
      title: 'Ecografía general',
      subtitle: 'Estudios sin radiación, con diagnóstico rápido en múltiples órganos y sistemas.',
      bookingId: 'ecografia-general',
      what: 'Es un método de diagnóstico por imágenes que usa ondas de ultrasonido para ver estructuras internas del cuerpo en tiempo real. No usa radiación, no es invasivo y permite estudiar múltiples órganos: abdomen, mama, tiroides, ginecología, partes blandas y más.',
      how: 'Te acostás en una camilla. El técnico aplica gel sobre la zona y desliza un transductor que envía y recibe ondas de ultrasonido. Las imágenes se ven en una pantalla y se guardan para el informe final.',
      prep: 'Depende del tipo: <strong>Abdominal</strong> requiere ayuno de 8 horas. <strong>Ginecológica/vesical</strong> requiere vejiga llena (1 litro de agua 1 hora antes). <strong>Mamaria, tiroidea, musculoesquelética</strong> no requieren preparación.',
      duration: '20 a 40 minutos según el tipo.',
      detectsTitle: 'Tipos disponibles',
      detects: [
        'Abdominal completa',
        'Ginecológica y obstétrica',
        'Mamaria',
        'Tiroidea',
        'Musculoesquelética',
        'Renal y vías urinarias'
      ]
    },

    'ergometria': {
      tag: 'Pruebas de esfuerzo',
      title: 'Ergometría graduada en cinta profesional',
      subtitle: 'Prueba de esfuerzo con monitoreo cardiovascular continuo durante el ejercicio.',
      bookingId: 'ergometria',
      what: 'Es una prueba de esfuerzo que evalúa el comportamiento del corazón ante el ejercicio físico controlado. Caminás o trotás en una cinta ergométrica profesional que aumenta velocidad e inclinación de forma graduada, mientras se monitorea tu ECG, presión arterial y frecuencia cardíaca de manera continua.',
      how: 'Te colocamos electrodos en el pecho y un manguito de presión arterial. Empezás caminando suave y la cinta va aumentando intensidad cada 3 minutos siguiendo un protocolo estándar. El cardiólogo está siempre presente, controlando todos los parámetros. La prueba finaliza al alcanzar el esfuerzo máximo o si aparece algún síntoma significativo.',
      prep: 'Ayuno de 3 horas. Ropa cómoda y zapatillas deportivas. No fumar ni tomar café 2 horas antes. Consultá con tu médico si debés suspender medicación cardiovascular (algunos beta-bloqueantes requieren suspensión).',
      duration: '30 a 45 minutos en total (15-20 minutos sobre la cinta más colocación y recuperación).',
      detectsTitle: 'Indicada para',
      detects: [
        'Evaluar salud cardiovascular general',
        'Estudios prequirúrgicos',
        'Apto físico (clubes, gimnasios, escuelas)',
        'Detectar isquemia silente',
        'Evaluar respuesta al tratamiento',
        'Estratificación de riesgo cardiovascular'
      ]
    }

  };

  // ─── Render ───
  function render() {
    var id = new URLSearchParams(window.location.search).get('id');
    var p = PRACTICAS[id];
    var root = document.getElementById('practica-root');
    if (!p) {
      root.innerHTML =
        '<div class="practica-404">' +
        '<h1>Práctica no encontrada</h1>' +
        '<p>El estudio que buscás no existe o el enlace está incompleto.</p>' +
        '<a href="index.html" class="btn-primary">← Volver al inicio</a>' +
        '</div>';
      document.title = 'CICAR — Práctica no encontrada';
      return;
    }

    document.title = 'CICAR — ' + p.title;

    var detectsHtml = p.detects.map(function (d) { return '<li>' + d + '</li>'; }).join('');

    root.innerHTML =
      '<section class="practica-hero">' +
        '<div class="practica-hero-inner">' +
          '<div class="practica-tag">' + p.tag + '</div>' +
          '<h1>' + p.title + '</h1>' +
          '<p>' + p.subtitle + '</p>' +
        '</div>' +
      '</section>' +

      '<main class="practica-content">' +
        '<div class="practica-section">' +
          '<h2>¿Qué es?</h2>' +
          '<p>' + p.what + '</p>' +
        '</div>' +

        '<div class="practica-section">' +
          '<h2>¿Cómo se hace?</h2>' +
          '<p>' + p.how + '</p>' +
        '</div>' +

        '<div class="practica-row">' +
          '<div class="practica-card">' +
            '<h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Preparación</h3>' +
            '<p>' + p.prep + '</p>' +
          '</div>' +
          '<div class="practica-card">' +
            '<h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Duración</h3>' +
            '<p>' + p.duration + '</p>' +
          '</div>' +
        '</div>' +

        '<div class="practica-section">' +
          '<h2>' + p.detectsTitle + '</h2>' +
          '<ul class="practica-list">' + detectsHtml + '</ul>' +
        '</div>' +
      '</main>' +

      '<section class="practica-cta">' +
        '<div class="practica-cta-inner">' +
          '<h2>¿Listo para sacar tu turno?</h2>' +
          '<p>Reservá online en minutos o coordiná por WhatsApp con nuestro equipo de turnos.</p>' +
          '<div class="practica-cta-buttons">' +
            '<a href="portal.html?estudio=' + p.bookingId + '" class="btn-primary">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' +
              'Sacar turno por web' +
            '</a>' +
            '<a href="https://wa.me/5491122853697?text=Hola%2C%20quisiera%20sacar%20turno%20para%20' + encodeURIComponent(p.title) + '" class="btn-outline" target="_blank" rel="noopener">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-6.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>' +
              'Turno por WhatsApp' +
            '</a>' +
          '</div>' +
        '</div>' +
      '</section>';
  }

  render();
</script>

</body>
</html>
